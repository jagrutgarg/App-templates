name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Databricks CLI ───────────────────────────────────────
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "Databricks CLI version:"
          databricks --version

      # ── Step 3: Debug — list repo contents so we confirm folder name ─────────
      - name: Debug - show repo structure
        run: |
          echo "=== Repo root contents ==="
          ls -la
          echo ""
          echo "=== Looking for app.py anywhere ==="
          find . -name "app.py" | head -20

      # ── Step 4: Print app details from Databricks ────────────────────────────
      - name: Print app details from Databricks
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          echo "=== App details (look for source_code_path) ==="
          curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | python3 -m json.tool || echo "Could not fetch app details"

      # ── Step 5: Upload files using curl (avoids CLI syntax issues) ───────────
      # Using the Databricks REST API directly — more reliable than CLI import
      - name: Upload app files via REST API
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # ── CHANGE THIS if your folder name is different ──
          # Check Step 3 logs to see the exact folder name containing app.py
          APP_LOCAL_PATH="streamlit-chatbot-app"

          # ── CHANGE THIS to match source_code_path from Step 4 logs ──
          APP_WORKSPACE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"

          echo "Local  : $APP_LOCAL_PATH"
          echo "Remote : $APP_WORKSPACE_PATH"
          echo ""

          # Create the remote directory via API
          echo "Creating remote directory..."
          curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH\"}"
          echo ""

          # Upload each file via the workspace import API (base64 encoded)
          upload_file() {
            local LOCAL_FILE="$1"
            local REMOTE_PATH="$2"
            local FILENAME=$(basename "$LOCAL_FILE")

            if [ ! -f "$LOCAL_FILE" ]; then
              echo "⚠️  Skipping $FILENAME (not found locally)"
              return
            fi

            echo "→ Uploading $FILENAME to $REMOTE_PATH"

            # Base64 encode the file content
            CONTENT=$(base64 -w 0 "$LOCAL_FILE")

            # Detect format
            if [[ "$FILENAME" == *.py ]]; then
              FORMAT="SOURCE"
            else
              FORMAT="AUTO"
            fi

            RESPONSE=$(curl -s -w "\nHTTP:%{http_code}" \
              -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"path\": \"$REMOTE_PATH\",
                \"content\": \"$CONTENT\",
                \"format\": \"$FORMAT\",
                \"overwrite\": true,
                \"language\": \"PYTHON\"
              }")

            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP:" | cut -d: -f2)
            echo "  Status: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "  ⚠️ Upload may have failed. Response: $RESPONSE"
            else
              echo "  ✅ $FILENAME uploaded successfully"
            fi
          }

          # Upload all app files
          upload_file "$APP_LOCAL_PATH/app.py"               "$APP_WORKSPACE_PATH/app.py"
          upload_file "$APP_LOCAL_PATH/app.yaml"             "$APP_WORKSPACE_PATH/app.yaml"
          upload_file "$APP_LOCAL_PATH/model_serving_utils.py" "$APP_WORKSPACE_PATH/model_serving_utils.py"
          upload_file "$APP_LOCAL_PATH/requirements.txt"     "$APP_WORKSPACE_PATH/requirements.txt"

          echo ""
          echo "=== Verifying remote files ==="
          curl -s "$DATABRICKS_HOST/api/2.0/workspace/list?path=$APP_WORKSPACE_PATH" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | python3 -m json.tool

      # ── Step 6: Trigger fresh deployment ─────────────────────────────────────
      - name: Trigger new deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          SOURCE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"

          echo "Triggering deployment for app: $APP_NAME"
          echo "Source: $SOURCE_PATH"

          RESPONSE=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/deployments" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_path\": \"$SOURCE_PATH\"}")

          echo "Response: $RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP:" | cut -d: -f2)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Deployment triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Got HTTP $HTTP_CODE — trying restart fallback..."
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json"
            echo "Restart fallback sent."
          fi

      # ── Step 7: Poll until RUNNING ───────────────────────────────────────────
      - name: Wait for app to be live
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          echo "Polling app status every 15s (max 90s)..."

          for i in $(seq 1 6); do
            sleep 15
            STATE=$(curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',{}).get('state','UNKNOWN'))" \
              2>/dev/null || echo "UNKNOWN")

            echo "  Check $i/6 → State: $STATE"
            [ "$STATE" = "RUNNING" ] && echo "✅ App is RUNNING!" && break
          done

      # ── Step 8: Summary ──────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "============================================"
          echo "  ✅ Janta Seva CI/CD pipeline complete"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Time   : $(date -u)"
          echo "============================================"
