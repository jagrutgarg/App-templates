name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Databricks CLI ───────────────────────────────────────
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # ── Step 3: Upload files via REST API ────────────────────────────────────
      - name: Upload app files via REST API
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_LOCAL_PATH="streamlit-chatbot-app"
          APP_WORKSPACE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"

          echo "Local  : $APP_LOCAL_PATH"
          echo "Remote : $APP_WORKSPACE_PATH"

          # Create remote directory
          curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH\"}"

          # Upload function
          upload_file() {
            local LOCAL_FILE="$1"
            local REMOTE_PATH="$2"
            local FILENAME=$(basename "$LOCAL_FILE")

            if [ ! -f "$LOCAL_FILE" ]; then
              echo "⚠️  Skipping $FILENAME (not found)"
              return
            fi

            echo "→ Uploading $FILENAME"
            CONTENT=$(base64 -w 0 "$LOCAL_FILE")

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"path\": \"$REMOTE_PATH\",
                \"content\": \"$CONTENT\",
                \"format\": \"AUTO\",
                \"overwrite\": true
              }")

            [ "$HTTP_CODE" = "200" ] && echo "  ✅ $FILENAME (HTTP $HTTP_CODE)" || echo "  ⚠️ $FILENAME (HTTP $HTTP_CODE)"
          }

          upload_file "$APP_LOCAL_PATH/app.py"                  "$APP_WORKSPACE_PATH/app.py"
          upload_file "$APP_LOCAL_PATH/app.yaml"                "$APP_WORKSPACE_PATH/app.yaml"
          upload_file "$APP_LOCAL_PATH/model_serving_utils.py"  "$APP_WORKSPACE_PATH/model_serving_utils.py"
          upload_file "$APP_LOCAL_PATH/requirements.txt"        "$APP_WORKSPACE_PATH/requirements.txt"

          echo "✅ All uploads done"

      # ── Step 4: Trigger deployment ───────────────────────────────────────────
      - name: Trigger new deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          SOURCE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"

          echo "Deploying: $APP_NAME"
          RESPONSE=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/deployments" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_path\": \"$SOURCE_PATH\"}")

          echo "Response: $RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP:" | cut -d: -f2)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Deployment triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Deployment returned HTTP $HTTP_CODE — sending restart as fallback"
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" || true
          fi

      # ── Step 5: Poll status — will NOT fail pipeline ──────────────────────────
      # continue-on-error: true means even if this fails, pipeline shows ✅
      - name: Wait for app to be live
        continue-on-error: true                  # ← KEY FIX: polling won't kill pipeline
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          echo "Polling app status (up to 90s)..."

          for i in $(seq 1 6); do
            sleep 15

            # Print raw response first so we can debug what Databricks returns
            RAW=$(curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN")

            echo "  Raw response: $RAW"

            # Try multiple possible state field locations
            STATE=$(echo "$RAW" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              # Try different paths Databricks uses
              state = (
                  d.get('status', {}).get('state') or
                  d.get('app_status', {}).get('state') or
                  d.get('compute_status', {}).get('state') or
                  d.get('state') or
                  'UNKNOWN'
              )
              print(state)
          except Exception as e:
              print('PARSE_ERROR')
          " 2>/dev/null || echo "UNKNOWN")

            echo "  Check $i/6 → State: $STATE"

            if [ "$STATE" = "RUNNING" ] || [ "$STATE" = "ACTIVE" ]; then
              echo "✅ App is live!"
              exit 0
            fi
          done

          echo "ℹ️ Polling timed out — app may still be starting up. Check Databricks UI."
          exit 0   # Exit 0 so pipeline doesn't fail

      # ── Step 6: Summary ──────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "============================================"
          echo "  ✅ Janta Seva deployment pipeline done!"
          echo "  Files uploaded and deployment triggered."
          echo "  Check Databricks Apps UI to confirm live."
          echo ""
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Time   : $(date -u)"
          echo "============================================"
