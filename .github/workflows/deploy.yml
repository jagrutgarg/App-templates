name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Databricks CLI
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # Step 4: Upload full app folder
      - name: Upload app folder to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_WORKSPACE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"
          APP_LOCAL_PATH="e2e-chatbot-app-next"

          echo "Syncing full folder..."
          echo "Local: $APP_LOCAL_PATH"
          echo "Remote: $APP_WORKSPACE_PATH"

          databricks workspace mkdirs "$APP_WORKSPACE_PATH"

          databricks workspace import-dir "$APP_LOCAL_PATH" "$APP_WORKSPACE_PATH" --overwrite

          echo "Upload complete ✅"

      # Step 5: Restart app via API (IMPORTANT FIX)
      - name: Restart Databricks App via API
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          APP_NAME: ${{ secrets.DATABRICKS_APP_NAME }}
        run: |
          echo "Restarting app: $APP_NAME"

          curl -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json"

          echo "Restart request sent 🚀"

      # Step 6: Deployment summary
      - name: Deployment summary
        run: |
          echo "================================="
          echo "✅ Deployment successful"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Time: $(date -u)"
          echo "================================="
