name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Databricks CLI ───────────────────────────────────────
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # ── Step 3: Show repo structure ───────────────────────────────────────────
      - name: Show repo structure
        run: |
          echo "=== Root files ==="
          find . -maxdepth 1 -type f | sort

      # ── Step 4: Upload all files ───────────────────────────────────────────────
      - name: Upload app files
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_WORKSPACE_PATH="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"

          # ── Delete old notebook-typed files to avoid type mismatch ──
          echo "=== Deleting old files ==="
          for ITEM in app.py model_serving_utils.py app.yaml requirements.txt; do
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/delete" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"$APP_WORKSPACE_PATH/$ITEM\", \"recursive\": false}" \
              && echo "  Deleted $ITEM" || echo "  $ITEM not found (OK)"
          done

          # ── Ensure directory exists ──
          echo ""
          echo "=== Creating directory ==="
          curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH\"}" && echo "Directory ready"

          # ── Generic upload via workspace/import (works for ALL file types) ──
          upload() {
            local SRC="$1"
            local DEST="$2"
            local FORMAT="$3"   # SOURCE or AUTO
            local LANG="$4"     # PYTHON or "" (empty for non-python)
            local FNAME=$(basename "$SRC")

            if [ ! -f "$SRC" ]; then
              echo "  ⚠️ SKIPPED: $SRC not found"
              return 0
            fi

            echo ""
            echo "→ Uploading: $FNAME ($(wc -c < "$SRC") bytes)"

            B64=$(base64 -w 0 "$SRC")

            # Build JSON body conditionally
            if [ -n "$LANG" ]; then
              BODY="{\"path\":\"$DEST\",\"content\":\"$B64\",\"format\":\"$FORMAT\",\"language\":\"$LANG\",\"overwrite\":true}"
            else
              BODY="{\"path\":\"$DEST\",\"content\":\"$B64\",\"format\":\"$FORMAT\",\"overwrite\":true}"
            fi

            HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            cat /tmp/resp.json && echo ""
            [ "$HTTP" = "200" ] && echo "  ✅ $FNAME OK" || { echo "  ❌ $FNAME FAILED (HTTP $HTTP)"; return 1; }
          }

          echo ""
          echo "=== Uploading files ==="
          # Python files — SOURCE format with PYTHON language
          upload "./app.py"                 "$APP_WORKSPACE_PATH/app.py"                 "SOURCE" "PYTHON"
          upload "./model_serving_utils.py" "$APP_WORKSPACE_PATH/model_serving_utils.py" "SOURCE" "PYTHON"

          # Non-python files — AUTO format, no language
          upload "./app.yaml"               "$APP_WORKSPACE_PATH/app.yaml"               "AUTO"   ""
          upload "./requirements.txt"       "$APP_WORKSPACE_PATH/requirements.txt"       "AUTO"   ""

          echo ""
          echo "=== Verifying workspace ==="
          curl -s "$DATABRICKS_HOST/api/2.0/workspace/list?path=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"))')" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | python3 -m json.tool

      # ── Step 5: Trigger deployment ────────────────────────────────────────────
      - name: Trigger deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          SOURCE="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"

          RESP=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/deployments" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_path\": \"$SOURCE\"}")

          echo "Response: $RESP"
          CODE=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)

          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            echo "✅ Deployment triggered"
          else
            echo "⚠️ Sending restart as fallback"
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" || true
          fi

      # ── Step 6: Poll status ───────────────────────────────────────────────────
      - name: Wait for app
        continue-on-error: true
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          for i in $(seq 1 8); do
            sleep 20
            RAW=$(curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN")
            STATE=$(echo "$RAW" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(d.get('status',{}).get('state') or d.get('state','UNKNOWN'))
          except: print('PARSE_ERR')
          " 2>/dev/null)
            echo "  Check $i/8 → $STATE"
            [ "$STATE" = "RUNNING" ] && echo "✅ App is live!" && exit 0
          done
          echo "ℹ️ Check Databricks UI for final status"
          exit 0

      # ── Step 7: Summary ───────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "=================================="
          echo " ✅ Janta Seva pipeline complete"
          echo " Commit: ${{ github.sha }}"
          echo " Time  : $(date -u)"
          echo "=================================="
