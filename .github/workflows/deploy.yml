name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Databricks CLI
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # Step 4: Upload app files to Databricks
      - name: Upload app files to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_WORKSPACE_PATH="/Workspace/Users/${{ secrets.DATABRICKS_USER_EMAIL }}/janta-seva"
          APP_LOCAL_PATH="e2e-chatbot-app-next"

          echo "Uploading files to $APP_WORKSPACE_PATH ..."

          for file in app.py app.yaml model_serving_utils.py requirements.txt; do
            if [ -f "$APP_LOCAL_PATH/$file" ]; then
              echo "Uploading $file"
              databricks workspace import \
                --file "$APP_LOCAL_PATH/$file" \
                --overwrite \
                "$APP_WORKSPACE_PATH/$file"
            else
              echo "File $file not found, skipping"
            fi
          done

          echo "Upload complete."

      # Step 5: Restart Databricks App
      - name: Restart Databricks App
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"

          echo "Restarting app: $APP_NAME"
          databricks apps restart "$APP_NAME"

          echo "App restart triggered."

      # Step 6: Done
      - name: Deployment summary
        run: |
          echo "================================="
          echo "Deployment successful 🚀"
          echo "Commit: ${{ github.sha }}"
          echo "================================="
