name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Databricks CLI ───────────────────────────────────────
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # ── Step 3: Show repo structure ───────────────────────────────────────────
      - name: Show repo structure
        run: |
          echo "=== Root files ==="
          find . -maxdepth 1 -type f | sort
          ls -la app.py && echo "✅ app.py FOUND" || echo "❌ app.py NOT FOUND"

      # ── Step 4: Delete old Notebook, then upload fresh files ──────────────────
      - name: Upload app files via Files API
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_WORKSPACE_PATH="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"

          # ── A: Delete old app.py which Databricks stored as NOTEBOOK type ──
          echo "=== Deleting old app.py notebook ==="
          curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/delete" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH/app.py\", \"recursive\": false}" \
            && echo "  ✅ Deleted" || echo "  ℹ️ Nothing to delete (OK)"

          curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/delete" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH/model_serving_utils.py\", \"recursive\": false}" \
            && echo "  ✅ Deleted model_serving_utils" || echo "  ℹ️ OK"

          # ── B: Ensure directory exists ──
          echo ""
          echo "=== Creating workspace directory ==="
          curl -sf -X POST "$DATABRICKS_HOST/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH\"}" \
            && echo "  ✅ Directory ready" || echo "  ⚠️ Already exists (OK)"

          # ── Upload Python files with format=SOURCE (NOT AUTO) ──
          upload_py() {
            local SRC="$1"
            local DEST="$2"
            local FNAME=$(basename "$SRC")

            if [ ! -f "$SRC" ]; then
              echo "  ⚠️ SKIPPED: $SRC not found"
              return 0
            fi

            echo ""
            echo "→ Uploading Python: $FNAME  ($(wc -c < "$SRC") bytes)"

            B64=$(base64 -w 0 "$SRC")

            HTTP=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
              -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"path\": \"$DEST\",
                \"content\": \"$B64\",
                \"format\": \"SOURCE\",
                \"language\": \"PYTHON\",
                \"overwrite\": true
              }")

            cat /tmp/upload_resp.json && echo ""
            [ "$HTTP" = "200" ] && echo "  ✅ OK" || { echo "  ❌ FAILED (HTTP $HTTP)"; return 1; }
          }

          # ── Upload non-Python files via workspace-files PUT ──
          upload_raw() {
            local SRC="$1"
            local DEST="$2"
            local FNAME=$(basename "$SRC")

            if [ ! -f "$SRC" ]; then
              echo "  ⚠️ SKIPPED: $SRC not found"
              return 0
            fi

            echo ""
            echo "→ Uploading raw file: $FNAME"

            HTTP=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
              -X PUT "$DATABRICKS_HOST/api/2.0/workspace-files$DEST" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$SRC")

            cat /tmp/upload_resp.json && echo ""
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "204" ]; then
              echo "  ✅ OK"
            else
              echo "  ⚠️ PUT failed ($HTTP) — falling back to workspace import"
              B64=$(base64 -w 0 "$SRC")
              curl -s -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
                -H "Authorization: Bearer $DATABRICKS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"path\": \"$DEST\", \"content\": \"$B64\", \"format\": \"AUTO\", \"overwrite\": true}" \
                && echo "  ✅ Fallback OK" || echo "  ❌ Fallback also failed"
            fi
          }

          # ── C: Upload all files ──
          echo ""
          echo "=== Uploading files ==="
          upload_py  "./app.py"                 "$APP_WORKSPACE_PATH/app.py"
          upload_py  "./model_serving_utils.py" "$APP_WORKSPACE_PATH/model_serving_utils.py"
          upload_raw "./app.yaml"               "$APP_WORKSPACE_PATH/app.yaml"
          upload_raw "./requirements.txt"       "$APP_WORKSPACE_PATH/requirements.txt"

          echo ""
          echo "=== Verifying workspace contents ==="
          curl -s "$DATABRICKS_HOST/api/2.0/workspace/list?path=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"))')" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | python3 -m json.tool

      # ── Step 5: Trigger deployment ────────────────────────────────────────────
      - name: Trigger deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          SOURCE="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"

          RESP=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/deployments" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_path\": \"$SOURCE\"}")

          echo "Response: $RESP"
          CODE=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)

          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            echo "✅ Deployment triggered"
          else
            echo "⚠️ Sending restart as fallback"
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" || true
          fi

      # ── Step 6: Poll status ───────────────────────────────────────────────────
      - name: Wait for app
        continue-on-error: true
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          for i in $(seq 1 6); do
            sleep 15
            RAW=$(curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN")
            STATE=$(echo "$RAW" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(d.get('status',{}).get('state') or d.get('state','UNKNOWN'))
          except: print('PARSE_ERR')
          " 2>/dev/null)
            echo "  Check $i/6 → $STATE"
            [ "$STATE" = "RUNNING" ] && echo "✅ App is live!" && exit 0
          done
          echo "ℹ️ Check Databricks UI for final status"
          exit 0

      # ── Step 7: Summary ───────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "=================================="
          echo " ✅ Janta Seva pipeline complete"
          echo " Commit: ${{ github.sha }}"
          echo " Time  : $(date -u)"
          echo "=================================="
