name: Deploy Janta Seva to Databricks Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install Databricks CLI ───────────────────────────────────────
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      # ── Step 3: Show exact repo structure ────────────────────────────────────
      - name: Show repo structure
        run: |
          echo "=== All files in repo root ==="
          find . -maxdepth 1 -type f | sort
          echo ""
          echo "=== app.py exists? ==="
          ls -la app.py && echo "✅ FOUND" || echo "❌ NOT FOUND"

      # ── Step 4: Upload via Databricks Files API ───────────────────────────────
      - name: Upload app files via Files API
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_WORKSPACE_PATH="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"
          APP_LOCAL_PATH="."        # ← files are at the ROOT of the repo

          echo "Uploading to: $APP_WORKSPACE_PATH"

          # ── Create directory ──
          echo "→ Creating workspace directory..."
          curl -sf -X POST "$DATABRICKS_HOST/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\": \"$APP_WORKSPACE_PATH\"}" \
            && echo "  ✅ Directory ready" || echo "  ⚠️ Already exists"

          # ── Upload function ──
          upload_file() {
            local SRC="$1"
            local DEST="$2"
            local FNAME=$(basename "$SRC")

            if [ ! -f "$SRC" ]; then
              echo "  ⚠️ SKIPPED: $SRC does not exist locally"
              return 0    # non-fatal — don't fail the whole job
            fi

            echo ""
            echo "→ Uploading: $FNAME  ($(wc -c < "$SRC") bytes)"
            echo "  Remote: $DEST"

            B64=$(base64 -w 0 "$SRC")

            HTTP=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
              -X POST "$DATABRICKS_HOST/api/2.0/workspace/import" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"path\": \"$DEST\",
                \"content\": \"$B64\",
                \"format\": \"AUTO\",
                \"overwrite\": true
              }")

            cat /tmp/upload_resp.json
            echo ""

            if [ "$HTTP" = "200" ]; then
              echo "  ✅ $FNAME uploaded OK"
            else
              echo "  ❌ $FNAME FAILED (HTTP $HTTP)"
              return 1
            fi
          }

          # ── Upload all files from root ──
          upload_file "$APP_LOCAL_PATH/app.py"                 "$APP_WORKSPACE_PATH/app.py"
          upload_file "$APP_LOCAL_PATH/app.yaml"               "$APP_WORKSPACE_PATH/app.yaml"
          upload_file "$APP_LOCAL_PATH/requirements.txt"       "$APP_WORKSPACE_PATH/requirements.txt"
          upload_file "$APP_LOCAL_PATH/model_serving_utils.py" "$APP_WORKSPACE_PATH/model_serving_utils.py"

          echo ""
          echo "=== Verifying files in Databricks workspace ==="
          curl -s "$DATABRICKS_HOST/api/2.0/workspace/list?path=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"))')" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | python3 -m json.tool

      # ── Step 5: Trigger fresh deployment ─────────────────────────────────────
      - name: Trigger deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          SOURCE="/Workspace/Users/mems250005018@iiti.ac.in/janta-seva"

          echo "Triggering deployment: $APP_NAME"
          RESP=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/deployments" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_path\": \"$SOURCE\"}")

          echo "Response: $RESP"
          CODE=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)

          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            echo "✅ Deployment triggered (HTTP $CODE)"
          else
            echo "⚠️ HTTP $CODE — sending restart as fallback"
            curl -s -X POST "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME/restart" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" || true
          fi

      # ── Step 6: Poll status ───────────────────────────────────────────────────
      - name: Wait for app
        continue-on-error: true
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          APP_NAME="${{ secrets.DATABRICKS_APP_NAME }}"
          for i in $(seq 1 6); do
            sleep 15
            RAW=$(curl -s "$DATABRICKS_HOST/api/2.0/apps/$APP_NAME" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN")
            STATE=$(echo "$RAW" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(d.get('status',{}).get('state') or d.get('state','UNKNOWN'))
          except: print('PARSE_ERR')
          " 2>/dev/null)
            echo "  Check $i/6 → $STATE"
            [ "$STATE" = "RUNNING" ] && echo "✅ App is live!" && exit 0
          done
          echo "ℹ️ Check Databricks UI for final status"
          exit 0

      # ── Step 7: Summary ───────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "=================================="
          echo " ✅ Janta Seva pipeline complete"
          echo " Commit: ${{ github.sha }}"
          echo " Time  : $(date -u)"
          echo "=================================="
